    }
}
%---------------------------------------------------------------------------%
%->> 硕士/博士特定格式（在文档开始时根据学位类型应用）
%---------------------------------------------------------------------------%
\AtBeginDocument{%
    \cuzifstreq{\cuz@value@degree}{学士}{}{%
        %- 硕士/博士论文章标题：三号黑体居中
        \ctexset{
            chapter = {
                format = \linespread{1.5}\zihao{3}\bfseries\heiti\centering,
                number = \arabic{chapter},
                name = {},
                aftername = \hskip 0.5em,
                beforeskip = 1.5ex,
                afterskip = 1.5ex,
            }
        }%
        %- 硕士/博士论文行距：1.5倍
        \linespread{1.5}\selectfont%
        %- 硕士/博士论文页边距：上下2.5cm，左3cm（装订侧），右2.5cm
        \newgeometry{top=2.5cm, bottom=2.5cm, left=3cm, right=2.5cm}%
    }%
}
