%- 本科郑重声明
\def\cuz@value@declare@create{郑重声明}
\def\cuz@value@declare@creativity{%
    我谨在此郑重声明：本人所写的毕业论文《\cuz@declaration@title》均系本人独立完成，没有抄袭行为，
    凡涉及其他作者的观点和材料，均作了注释，若有不实，后果由本人承担。
}
\def\cuz@value@declare@s{承诺人（签名）：}
\def\cuz@value@declare@d{\qquad\qquad 年\qquad 月\qquad 日}
%- 硕士/博士独创性声明
\def\cuz@value@declare@origcreate{独创性声明}
\def\cuz@value@declare@origcreativity{%
    本人郑重声明：本学位论文是本人在导师的指导下，独立进行研究工作所取得的成果。
    论文中除特别标注和致谢的地方外，不包含他人或其他机构已经发表或撰写过的研究成果。
    对本文研究做出重要贡献的个人和集体，均已在文中作了明确标明。
    本声明的法律结果由本人承担。
}
%- 硕士/博士学位论文使用授权声明
\def\cuz@value@declare@authcreate{学位论文使用授权声明}
\def\cuz@value@declare@authcreativity{%
    本人完全了解浙江传媒学院关于收集、保存、使用学位论文的规定，即：
    学校有权保存学位论文的电子和纸质文档，允许学位论文被查阅和借阅；
    学校可以公布学位论文的全部或部分内容，可以采用影印、缩印或其他复制手段保存学位论文。
    保密学位论文在解密后遵守此规定。
}
