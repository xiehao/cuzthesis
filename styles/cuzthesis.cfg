        number = \arabic{chapter},
        name = {},
        aftername = \hskip 0.5em,
        beforeskip = 1.5ex,
        afterskip = 1.5ex,
        % pagestyle = plain,
        % break = \par,
    }
}
%- 节格式
\ctexset {
    section = {
        format = \linespread{1.5}\zihao{-4}\bfseries\raggedright,
        aftername = \hskip 0.5em,
        beforeskip = 0.4ex,
        afterskip = 0.4ex,
        indent = 2em,
    }
}
%- 小节格式
\ctexset {
    subsection = {
        format = \linespread{1.5}\zihao{-4}\bfseries\raggedright,
        aftername = \hskip 0.5em,
