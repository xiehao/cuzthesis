%---------------------------------------------------------------------------%
%- 本文件在 cuzthesis.cfg 之后加载，专用于覆盖/补充硕士论文的格式设置。
%- 仅当文档类选项包含 master 时才会被加载。
%---------------------------------------------------------------------------%
%->> 文件标识
%---------------------------------------------------------------------------%
\ProvidesFile{cuzthesis-master.cfg}[2025/01/01 v1.0 master thesis configuration]%
%---------------------------------------------------------------------------%
%->> 硕士专属标签
%---------------------------------------------------------------------------%
%- 页眉标签：正文至附录结束均使用此标签
\def\cuz@label@header@masthesis{硕士学位论文}
%---------------------------------------------------------------------------%
%->> 声明页内容（硕士版本）
%---------------------------------------------------------------------------%
%- 覆盖本科版郑重声明标题与内容，后续可补充完整的硕士版声明文本
\def\cuz@value@declare@create{学位论文原创性声明}
\def\cuz@value@declare@creativity{%
    （硕士论文原创性声明内容，待补充）
}
%---------------------------------------------------------------------------%
%->> 章节标题格式（覆盖 cuzthesis.cfg 中的对应设置）
%---------------------------------------------------------------------------%
%- 章标题：三号黑体，编号与标题间空一格（如：1 章标题）
\ctexset{
    chapter = {
        format = \linespread{1.5}\zihao{3}\heiti\bfseries\raggedright,
        number = \arabic{chapter},
        name = {},
        aftername = \hskip 1em,
        beforeskip = 1.5ex,
        afterskip = 1.5ex,
    }
}
%- 节标题：小三号黑体，左起顶格（如：1.1 节标题）
\ctexset{
    section = {
        format = \linespread{1.5}\zihao{-3}\heiti\bfseries\raggedright,
        aftername = \hskip 0.5em,
        beforeskip = 0.4ex,
        afterskip = 0.4ex,
        indent = 0pt,
    }
}
%- 二级节标题：小四号宋体，左起顶格（如：1.1.1 二级节标题）
\ctexset{
    subsection = {
        format = \linespread{1.5}\zihao{-4}\songti\bfseries\raggedright,
        aftername = \hskip 0.5em,
        beforeskip = 0.4ex,
        afterskip = 0.4ex,
        indent = 0pt,
    }
}
%- 三级节标题：小四号宋体，左起顶格
\ctexset{
    subsubsection = {
        format = \linespread{1.5}\zihao{-4}\songti\raggedright,
        aftername = \hskip 0.5em,
        beforeskip = 0.4ex,
        afterskip = 0.4ex,
        indent = 0pt,
    }
}
%---------------------------------------------------------------------------%
%->> 正文格式
%---------------------------------------------------------------------------%
%- 正文：小四号（已由 LoadClass 的 zihao=-4 设置），1.5 倍行距
\linespread{1.5}\selectfont
%- 英文字体（正文小四号 Times New Roman）
%- 注意：fontspec 宏包由 artratex.sty 加载（需使用 XeLaTeX 编译）
\ifxetex
    \setmainfont{Times New Roman}
\fi
%---------------------------------------------------------------------------%
\endinput
